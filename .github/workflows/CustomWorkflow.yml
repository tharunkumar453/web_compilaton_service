name: ci-cd workflows

on:
  push:
    branches: [main]
jobs:
  job-build:
    runs-on: ubuntu-latest
    steps:
      - name: dump code from github to temp os 
        uses: actions/checkout@v4
     
   
      - name : Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name : Build images onky not run containers 
        run: docker compose build

      - name : Push more images to DockerHub with custom tags
        run : |
          USER=${{ secrets.DOCKER_USERNAME }}
          IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep web_compilaton_service)
          for IMAGE in $IMAGES; do
            docker tag $IMAGE $USER/$IMAGE
            docker push $USER/$IMAGE
          done
        
  job-deploy:
    runs-on: ubuntu-latest
    needs: job-build

    steps:
    - name: Create SSH key file
      run: |
        echo "${{ secrets.SERVER_SSH_KEY }}" > ssh_key.pem
        chmod 600 ssh_key.pem

    - name: Deploy to remote server
      run: |
        ssh -o StrictHostKeyChecking=no -i ssh_key.pem ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << EOF
        cd ~/TharunKumar
        docker compose pull
        docker compose up -d
        EOF
        
