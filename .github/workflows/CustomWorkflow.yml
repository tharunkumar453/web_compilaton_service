name: ci-cd workflows

on:
  push:
    branches: [main]
jobs:
  job-build:
    runs-on: ubuntu-latest
    steps:
      - name: dump code from github to temp os 
        uses: actions/checkout@v4
     
   
      - name : Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name : Build images onky not run containers 
        run: docker compose build

      - name : Push more images to DockerHub with custom tags
        run : |
          USER=${{ secrets.DOCKER_USERNAME }}
          IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep web_compilaton_service)
          for IMAGE in $IMAGES; do
            docker tag $IMAGE $USER/$IMAGE
            docker push $USER/$IMAGE
          done
         
  job-deploy:
    runs-on: ubuntu-latest
    needs: job-build
    steps:
      - name:  log in to vm   
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/TharunKumar
            docker compose pull
            docker compose down
            docker compose up -d
            
             
 
         

          
        
        
