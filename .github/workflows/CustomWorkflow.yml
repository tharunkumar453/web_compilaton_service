name: ci-cd workflows

on:
  [workflow_dispatch]
jobs:
  job-build:
    runs-on: ubuntu-latest
    steps:
      - name: dump code from github to temp os 
        uses: actions/checkout@v4
     
   
      - name : Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name : Build images onky not run containers 
        run: docker compose build

      - name : Push more images to DockerHub with custom tags
        run : |
          USER=${{ secrets.DOCKER_USERNAME }}
          IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep web_compilaton_service)
          for IMAGE in $IMAGES; do
            docker tag $IMAGE $USER/$IMAGE
            docker push $USER/$IMAGE
          done
         
  job-deploy:
    runs-on: ubuntu-latest
    needs: job-build
    steps:
      - name:  log in to vm   
        uses: appleboy/ssh-action@master
        with: 
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
      - name: pull and run the latest image on vm    
        run : |
            cd ~/Tharunkumar
            docker pull tharunkumar453/web_compilaton_service-web:latest
            docker run -d --name web -p 8000:8000 tharunkumar453/web_compilaton_service-web:latest


         

          
        
        
